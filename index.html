<!DOCTYPE html>
<html>
<head>
  <title>Student Registration</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { font-family: 'Poppins', sans-serif; }

    body {
      margin: 0;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      backdrop-filter: blur(15px);
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 30px;
      width: 420px;
      color: white;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
      outline: none;
      transition: 0.3s;
    }

    input:focus, select:focus {
      transform: scale(1.05);
      box-shadow: 0 0 10px white;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(to right, #00c6ff, #0072ff);
      color: white;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    button:hover {
      transform: scale(1.08);
      box-shadow: 0 0 15px #00c6ff;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>🎓 Student Registration</h2>

  <input type="text" id="name" placeholder="Full Name">

  <div class="row">
    <input type="number" id="age" placeholder="Age">
    <select id="gender">
      <option value="">Gender</option>
      <option>Male</option>
      <option>Female</option>
      <option>Other</option>
    </select>
  </div>

  <input type="text" id="phone" placeholder="Phone Number">
  <input type="email" id="email" placeholder="Email">

  <input type="text" id="course" placeholder="Course">
  <input type="text" id="dept" placeholder="Department">

  <select id="year">
    <option value="">Year</option>
    <option>1st</option>
    <option>2nd</option>
    <option>3rd</option>
    <option>4th</option>
  </select>

  <input type="text" id="college" placeholder="College Name">

  <div class="row">
    <input type="text" id="city" placeholder="City">
    <input type="text" id="state" placeholder="State">
  </div>

  <button onclick="saveData()">Register</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBBCqC4wlplOLrbTZtmNvwtjZa8pP3X6CM",
    authDomain: "studentapp-6b481.firebaseapp.com",
    projectId: "studentapp-6b481",
    storageBucket: "studentapp-6b481.firebasestorage.app",
    messagingSenderId: "788833624069",
    appId: "1:788833624069:web:68e15df515ab9a25913c6c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.saveData = async function () {

    const data = {
      name: document.getElementById("name").value.trim(),
      age: document.getElementById("age").value.trim(),
      gender: document.getElementById("gender").value,
      phone: document.getElementById("phone").value.trim(),
      email: document.getElementById("email").value.trim(),
      course: document.getElementById("course").value.trim(),
      department: document.getElementById("dept").value.trim(),
      year: document.getElementById("year").value,
      college: document.getElementById("college").value.trim(),
      city: document.getElementById("city").value.trim(),
      state: document.getElementById("state").value.trim(),
      createdAt: new Date()
    };

    // Validation
    if (
      !data.name ||
      !data.age ||
      !data.gender ||
      !data.phone ||
      !data.email ||
      !data.course ||
      !data.department ||
      !data.year ||
      !data.college ||
      !data.city ||
      !data.state
    ) {
      alert("⚠️ Please fill all fields properly");
      return;
    }

    try {
      await addDoc(collection(db, "students"), data);
      alert("✅ Registered Successfully!");

      document.querySelectorAll("input, select").forEach(el => el.value = "");

    } catch (e) {
      alert("Error: " + e);
      console.log(e);
    }
  };
</script>

</body>
</html>
