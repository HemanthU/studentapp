<!DOCTYPE html>
<html>
<head>
  <title>Student Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 20px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 10px;
      text-align: center;
    }

    th {
      background: rgba(0,0,0,0.3);
    }

    tr:hover {
      background: rgba(255,255,255,0.2);
    }
  </style>
</head>

<body>

<h2>📊 Student Dashboard</h2>

<table id="table">
  <thead>
    <tr>
      <th>Name</th>
      <th>Age</th>
      <th>Gender</th>
      <th>Phone</th>
      <th>Email</th>
      <th>Course</th>
      <th>Dept</th>
      <th>Year</th>
      <th>College</th>
      <th>City</th>
      <th>State</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBBCqC4wlplOLrbTZtmNvwtjZa8pP3X6CM",
    authDomain: "studentapp-6b481.firebaseapp.com",
    projectId: "studentapp-6b481",
    storageBucket: "studentapp-6b481.firebasestorage.app",
    messagingSenderId: "788833624069",
    appId: "1:788833624069:web:68e15df515ab9a25913c6c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function loadData() {
    const querySnapshot = await getDocs(collection(db, "students"));
    const tbody = document.querySelector("tbody");

    querySnapshot.forEach((doc) => {
      const d = doc.data();

      const row = `
        <tr>
          <td>${d.name}</td>
          <td>${d.age}</td>
          <td>${d.gender}</td>
          <td>${d.phone}</td>
          <td>${d.email}</td>
          <td>${d.course}</td>
          <td>${d.department}</td>
          <td>${d.year}</td>
          <td>${d.college}</td>
          <td>${d.city}</td>
          <td>${d.state}</td>
        </tr>
      `;

      tbody.innerHTML += row;
    });
  }

  loadData();
</script>

</body>
</html>
